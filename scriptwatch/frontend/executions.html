<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - ScriptWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-slate-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="dashboard.html" class="text-xl font-bold text-emerald-400">ScriptWatch</a>
                <div class="flex gap-6">
                    <a href="dashboard.html" class="hover:text-emerald-400 transition">Dashboard</a>
                    <a href="scripts.html" class="hover:text-emerald-400 transition">Scripts</a>
                    <a href="executions.html" class="text-emerald-400 font-medium">Histórico</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Histórico de Execuções</h1>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Script</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Data/Hora</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Duração</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-slate-600 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="executionsBody" class="divide-y divide-slate-200">
                    <tr><td colspan="5" class="px-6 py-4 text-slate-500">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const scriptFilter = params.get('script');

        async function loadExecutions() {
            try {
                let list;
                if (scriptFilter) {
                    list = await api.executions.listByScript(scriptFilter);
                } else {
                    list = await api.executions.list();
                }
                const body = document.getElementById('executionsBody');
                if (list.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-slate-500">Nenhuma execução registrada.</td></tr>';
                } else {
                    body.innerHTML = list.map(e => `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4 font-medium text-slate-800">${e.scriptNome || '-'}</td>
                            <td class="px-6 py-4 text-slate-600">${formatDateTime(e.inicio)}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs font-medium ${statusClass(e.status)}">${e.status}</span>
                            </td>
                            <td class="px-6 py-4 text-slate-600">${formatDuration(e.duracaoMs)}</td>
                            <td class="px-6 py-4 text-right">
                                <a href="details.html?id=${e.id}" class="text-emerald-600 hover:underline">Detalhes</a>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('executionsBody').innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-red-500">Erro ao carregar.</td></tr>';
            }
        }
        loadExecutions();
    </script>
</body>
</html>
