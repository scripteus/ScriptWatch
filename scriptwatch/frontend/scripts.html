<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts - ScriptWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-slate-800 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="dashboard.html" class="text-xl font-bold text-emerald-400">ScriptWatch</a>
                <div class="flex gap-6">
                    <a href="dashboard.html" class="hover:text-emerald-400 transition">Dashboard</a>
                    <a href="scripts.html" class="text-emerald-400 font-medium">Scripts</a>
                    <a href="executions.html" class="hover:text-emerald-400 transition">Histórico</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">Scripts</h1>
            <button id="btnNovo" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-2 rounded-lg transition">
                + Novo Script
            </button>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Nome</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Linguagem</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Responsável</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-600 uppercase">Ativo</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-slate-600 uppercase">Ações</th>
                    </tr>
                </thead>
                <tbody id="scriptsBody" class="divide-y divide-slate-200">
                    <tr><td colspan="5" class="px-6 py-4 text-slate-500">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal criar/editar -->
    <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-lg w-full mx-4 p-6">
            <h2 id="modalTitle" class="text-xl font-semibold text-slate-800 mb-4">Novo Script</h2>
            <form id="formScript">
                <input type="hidden" id="scriptId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nome *</label>
                        <input type="text" id="nome" required class="w-full border border-slate-300 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Descrição</label>
                        <textarea id="descricao" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Linguagem *</label>
                        <select id="linguagem" required class="w-full border border-slate-300 rounded-lg px-3 py-2">
                            <option value="">Selecione</option>
                            <option value="Python">Python</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="Bash">Bash</option>
                            <option value="PowerShell">PowerShell</option>
                            <option value="SQL">SQL</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Responsável *</label>
                        <input type="text" id="responsavel" required class="w-full border border-slate-300 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="ativo" checked>
                            <span class="text-sm text-slate-700">Ativo</span>
                        </label>
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" id="btnFechar" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let editando = false;

        async function loadScripts() {
            try {
                const list = await api.scripts.list();
                const body = document.getElementById('scriptsBody');
                if (list.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-slate-500">Nenhum script cadastrado.</td></tr>';
                } else {
                    body.innerHTML = list.map(s => `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4 font-medium text-slate-800">${s.nome}</td>
                            <td class="px-6 py-4 text-slate-600">${s.linguagem}</td>
                            <td class="px-6 py-4 text-slate-600">${s.responsavel}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs ${s.ativo ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-200 text-slate-600'}">${s.ativo ? 'Sim' : 'Não'}</span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <a href="executions.html?script=${s.id}" class="text-blue-600 hover:underline mr-2">Histórico</a>
                                <button class="text-emerald-600 hover:underline editar" data-id="${s.id}">Editar</button>
                            </td>
                        </tr>
                    `).join('');
                    document.querySelectorAll('.editar').forEach(btn => {
                        btn.addEventListener('click', () => abrirEdicao(btn.dataset.id));
                    });
                }
            } catch (e) {
                document.getElementById('scriptsBody').innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-red-500">Erro ao carregar.</td></tr>';
            }
        }

        function abrirModal(edicao = false) {
            editando = edicao;
            document.getElementById('modalTitle').textContent = edicao ? 'Editar Script' : 'Novo Script';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function fecharModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('formScript').reset();
            document.getElementById('scriptId').value = '';
        }

        async function abrirEdicao(id) {
            const s = await api.scripts.get(id);
            document.getElementById('scriptId').value = s.id;
            document.getElementById('nome').value = s.nome;
            document.getElementById('descricao').value = s.descricao || '';
            document.getElementById('linguagem').value = s.linguagem;
            document.getElementById('responsavel').value = s.responsavel;
            document.getElementById('ativo').checked = s.ativo;
            abrirModal(true);
        }

        document.getElementById('btnNovo').addEventListener('click', () => abrirModal(false));
        document.getElementById('btnFechar').addEventListener('click', fecharModal);

        document.getElementById('formScript').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                linguagem: document.getElementById('linguagem').value,
                responsavel: document.getElementById('responsavel').value,
                ativo: document.getElementById('ativo').checked
            };
            try {
                const id = document.getElementById('scriptId').value;
                if (id) {
                    await api.scripts.update(id, data);
                } else {
                    await api.scripts.create(data);
                }
                fecharModal();
                loadScripts();
            } catch (err) {
                alert('Erro: ' + err.message);
            }
        });

        loadScripts();
    </script>
</body>
</html>
