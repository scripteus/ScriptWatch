# ===========================================
# ScriptWatch - Configuração da Aplicação
# ===========================================

# Servidor
server.port=8080

# Banco de Dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/scriptwatch
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (validate = usar schema.sql; update = criar/atualizar automaticamente)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL validate = não altera schema; use update para criação automática
# Para desenvolvimento: spring.jpa.hibernate.ddl-auto=update
